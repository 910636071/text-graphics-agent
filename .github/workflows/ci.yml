name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python tests/text_graphics_agent_test.py

      - name: Run demo
        run: python -m text_graphics_agent.demo

      - name: Run benchmark
        run: python -m text_graphics_agent.benchmark
