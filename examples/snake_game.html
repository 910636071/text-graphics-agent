<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TGA Snake</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a0c;
      --panel: #15171b;
      --panel-2: #1f2329;
      --line: #343942;
      --text: #f4f7fb;
      --muted: #9aa4b2;
      --accent: #ffb000;
      --good: #43d17a;
      --danger: #ff5a5f;
      --blue: #55a7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(85, 167, 255, 0.14), transparent 34%),
        radial-gradient(circle at 82% 16%, rgba(255, 176, 0, 0.18), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(960px, calc(100vw - 32px));
      display: grid;
      grid-template-columns: minmax(320px, 560px) minmax(220px, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .game-shell,
    .side-panel {
      border: 1px solid var(--line);
      background: rgba(21, 23, 27, 0.92);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      border-radius: 8px;
    }

    .game-shell {
      padding: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .scoreboard {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .metric {
      min-width: 82px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 20px;
    }

    .canvas-wrap {
      position: relative;
      aspect-ratio: 1;
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #050608;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      background: rgba(5, 6, 8, 0.78);
    }

    .overlay[hidden] {
      display: none;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .overlay p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .side-panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-section {
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .panel-section:first-child {
      border-top: 0;
      padding-top: 0;
    }

    h2,
    h3 {
      margin: 0 0 10px;
      letter-spacing: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
      outline: 0;
    }

    .primary {
      width: 100%;
      background: var(--accent);
      color: #171100;
      border-color: #ffc24b;
    }

    .wide {
      grid-column: span 3;
    }

    .ghost {
      width: 100%;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 18px var(--good);
    }

    .status[data-state="over"] .dot {
      background: var(--danger);
      box-shadow: 0 0 18px var(--danger);
    }

    .status[data-state="paused"] .dot {
      background: var(--blue);
      box-shadow: 0 0 18px var(--blue);
    }

    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.65;
    }

    @media (max-width: 780px) {
      body {
        place-items: start center;
        padding: 16px 0;
      }

      main {
        grid-template-columns: 1fr;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .scoreboard {
        width: 100%;
        justify-content: stretch;
      }

      .metric {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="game-shell" aria-label="Snake game">
      <header>
        <div>
          <h1>TGA Snake</h1>
          <div class="tagline">A checked single-file browser game artifact.</div>
        </div>
        <div class="scoreboard" aria-label="Scoreboard">
          <div class="metric">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="metric">
            <span>Best</span>
            <strong id="best">0</strong>
          </div>
          <div class="metric">
            <span>Speed</span>
            <strong id="speed">1x</strong>
          </div>
        </div>
      </header>

      <div class="canvas-wrap">
        <canvas id="board" width="480" height="480" aria-label="Snake board"></canvas>
        <div class="overlay" id="overlay" hidden>
          <div>
            <h2 id="overlay-title">Game Over</h2>
            <p id="overlay-text">Press restart or Space to play again.</p>
            <button class="primary" id="overlay-restart">Restart</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="side-panel">
      <section class="panel-section">
        <h2>Controls</h2>
        <div class="status" id="status" data-state="running">
          <span class="dot"></span>
          <strong id="status-text">Running</strong>
        </div>
        <div class="controls" aria-label="Directional controls">
          <span></span>
          <button data-dir="up" aria-label="Move up">&uarr;</button>
          <span></span>
          <button data-dir="left" aria-label="Move left">&larr;</button>
          <button data-dir="down" aria-label="Move down">&darr;</button>
          <button data-dir="right" aria-label="Move right">&rarr;</button>
          <button class="wide" id="pause">Pause</button>
        </div>
      </section>

      <section class="panel-section">
        <h3>Rules</h3>
        <ul>
          <li>Arrow keys or WASD change direction.</li>
          <li>Eat amber cells to grow and speed up.</li>
          <li>Walls and your own trail end the run.</li>
        </ul>
      </section>

      <section class="panel-section">
        <button class="primary" id="restart">Restart Run</button>
      </section>
    </aside>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const speedEl = document.getElementById("speed");
      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("status-text");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlay-title");
      const overlayText = document.getElementById("overlay-text");

      const grid = 24;
      const cell = canvas.width / grid;
      const startSnake = [
        { x: 8, y: 12 },
        { x: 7, y: 12 },
        { x: 6, y: 12 }
      ];
      const vectors = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };
      const opposites = {
        up: "down",
        down: "up",
        left: "right",
        right: "left"
      };
      const bestStorageKey = "tga-snake-best-v1";

      let snake;
      let food;
      let direction;
      let pendingDirection;
      let score;
      let best = Number(localStorage.getItem(bestStorageKey) || 0);
      let gameOver;
      let paused;
      let tickMs;
      let timer = null;

      function reset() {
        snake = startSnake.map((part) => ({ ...part }));
        direction = "right";
        pendingDirection = "right";
        score = 0;
        gameOver = false;
        paused = false;
        tickMs = 150;
        food = { x: 16, y: 12 };
        overlay.hidden = true;
        updateHud();
        draw();
        schedule();
      }

      function schedule() {
        clearTimeout(timer);
        if (!gameOver && !paused) {
          timer = setTimeout(() => {
            step();
            schedule();
          }, tickMs);
        }
      }

      function updateHud() {
        scoreEl.textContent = String(score);
        bestEl.textContent = String(best);
        speedEl.textContent = `${Math.max(1, Math.round(150 / tickMs * 10) / 10)}x`;
        const state = gameOver ? "over" : paused ? "paused" : "running";
        statusEl.dataset.state = state;
        statusText.textContent = gameOver ? "Game over" : paused ? "Paused" : "Running";
        document.getElementById("pause").textContent = paused ? "Resume" : "Pause";
      }

      function setDirection(next) {
        if (!vectors[next] || opposites[next] === direction) {
          return false;
        }
        pendingDirection = next;
        return true;
      }

      function randomFood() {
        const open = [];
        for (let y = 0; y < grid; y += 1) {
          for (let x = 0; x < grid; x += 1) {
            if (!snake.some((part) => part.x === x && part.y === y)) {
              open.push({ x, y });
            }
          }
        }
        return open[Math.floor(Math.random() * open.length)] || { x: 1, y: 1 };
      }

      function endGame() {
        gameOver = true;
        clearTimeout(timer);
        if (score > best) {
          best = score;
          localStorage.setItem(bestStorageKey, String(best));
        }
        overlayTitle.textContent = "Game Over";
        overlayText.textContent = `Score ${score}. Press restart or Space to play again.`;
        overlay.hidden = false;
        updateHud();
        draw();
      }

      function step() {
        if (gameOver || paused) {
          return false;
        }
        direction = pendingDirection;
        const vector = vectors[direction];
        const head = snake[0];
        const next = { x: head.x + vector.x, y: head.y + vector.y };
        const wallHit = next.x < 0 || next.x >= grid || next.y < 0 || next.y >= grid;
        const willEat = next.x === food.x && next.y === food.y;
        const collisionBody = willEat ? snake : snake.slice(0, -1);
        const selfHit = collisionBody.some((part) => part.x === next.x && part.y === next.y);
        if (wallHit || selfHit) {
          endGame();
          return false;
        }
        snake.unshift(next);
        if (willEat) {
          score += 1;
          tickMs = Math.max(72, tickMs - 6);
          food = randomFood();
        } else {
          snake.pop();
        }
        updateHud();
        draw();
        return true;
      }

      function drawGrid() {
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for (let i = 1; i < grid; i += 1) {
          const pos = i * cell;
          ctx.beginPath();
          ctx.moveTo(pos, 0);
          ctx.lineTo(pos, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, pos);
          ctx.lineTo(canvas.width, pos);
          ctx.stroke();
        }
      }

      function drawCell(part, fill, inset = 2) {
        const x = part.x * cell + inset;
        const y = part.y * cell + inset;
        const size = cell - inset * 2;
        ctx.fillStyle = fill;
        ctx.fillRect(x, y, size, size);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#06080b";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        drawCell(food, "#ffb000", 4);
        snake.forEach((part, index) => {
          drawCell(part, index === 0 ? "#f4f7fb" : "#43d17a", index === 0 ? 3 : 4);
        });
      }

      function togglePause() {
        if (gameOver) {
          return;
        }
        paused = !paused;
        overlayTitle.textContent = "Paused";
        overlayText.textContent = "Press Space or Resume to continue.";
        overlay.hidden = !paused;
        updateHud();
        schedule();
      }

      function placeFoodAhead() {
        const vector = vectors[pendingDirection];
        const head = snake[0];
        const next = { x: head.x + vector.x, y: head.y + vector.y };
        if (next.x >= 0 && next.x < grid && next.y >= 0 && next.y < grid) {
          food = next;
          draw();
          return true;
        }
        return false;
      }

      function forceWallCollision() {
        snake = [
          { x: grid - 1, y: 4 },
          { x: grid - 2, y: 4 },
          { x: grid - 3, y: 4 }
        ];
        direction = "right";
        pendingDirection = "right";
        food = { x: 2, y: 2 };
        gameOver = false;
        paused = false;
        updateHud();
        draw();
      }

      document.addEventListener("keydown", (event) => {
        const keyMap = {
          ArrowUp: "up",
          ArrowDown: "down",
          ArrowLeft: "left",
          ArrowRight: "right",
          w: "up",
          s: "down",
          a: "left",
          d: "right"
        };
        if (event.key === " ") {
          event.preventDefault();
          if (gameOver) {
            reset();
          } else {
            togglePause();
          }
          return;
        }
        const next = keyMap[event.key];
        if (next) {
          event.preventDefault();
          setDirection(next);
        }
      });

      document.querySelectorAll("[data-dir]").forEach((button) => {
        button.addEventListener("click", () => setDirection(button.dataset.dir));
      });
      document.getElementById("pause").addEventListener("click", togglePause);
      document.getElementById("restart").addEventListener("click", reset);
      document.getElementById("overlay-restart").addEventListener("click", reset);

      window.__snakeDebug = {
        getState() {
          return {
            score,
            best,
            gameOver,
            paused,
            tickMs,
            direction,
            pendingDirection,
            head: { ...snake[0] },
            food: { ...food },
            snake: snake.map((part) => ({ ...part }))
          };
        },
        setDirection,
        step,
        restart: reset,
        enterManualMode() {
          clearTimeout(timer);
          paused = false;
          gameOver = false;
          overlay.hidden = true;
          updateHud();
          draw();
        },
        placeFoodAhead,
        forceWallCollision
      };

      reset();
    })();
  </script>
</body>
</html>
